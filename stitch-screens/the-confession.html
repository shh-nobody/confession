<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Veiled Sanctuary - Confession</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;family=Pinyon+Script&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-surface-variant": "#cac4d4",
                      "secondary": "#cdbff0",
                      "on-error": "#690005",
                      "on-error-container": "#ffdad6",
                      "surface-dim": "#131317",
                      "secondary-fixed-dim": "#cdbff0",
                      "surface-variant": "#353439",
                      "surface-container-low": "#1b1b1f",
                      "error-container": "#93000a",
                      "surface-bright": "#39393d",
                      "on-surface": "#e4e1e7",
                      "inverse-surface": "#e4e1e7",
                      "on-background": "#e4e1e7",
                      "secondary-fixed": "#e8ddff",
                      "on-secondary-container": "#bbaede",
                      "surface-container-highest": "#353439",
                      "primary-container": "#a78bfa",
                      "tertiary-fixed": "#f8e454",
                      "background": "#131317",
                      "inverse-primary": "#674bb5",
                      "surface-container": "#1f1f24",
                      "surface-container-high": "#2a292e",
                      "on-secondary-fixed": "#1f153b",
                      "primary-fixed-dim": "#cebdff",
                      "primary-fixed": "#e8ddff",
                      "on-tertiary-fixed": "#201c00",
                      "surface": "#131317",
                      "tertiary-fixed-dim": "#dbc839",
                      "on-secondary": "#342a51",
                      "surface-container-lowest": "#0e0e12",
                      "on-primary-container": "#3c1989",
                      "on-tertiary-container": "#3b3500",
                      "on-secondary-fixed-variant": "#4b4069",
                      "tertiary": "#dbc839",
                      "outline-variant": "#494552",
                      "tertiary-container": "#af9e00",
                      "inverse-on-surface": "#303034",
                      "on-primary-fixed": "#21005e",
                      "on-primary-fixed-variant": "#4f319c",
                      "primary": "#cebdff",
                      "outline": "#948e9d",
                      "secondary-container": "#4b4069",
                      "error": "#ffb4ab",
                      "on-primary": "#381385",
                      "surface-tint": "#cebdff",
                      "on-tertiary": "#373100",
                      "on-tertiary-fixed-variant": "#504700"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "spacing": {},
              "fontFamily": {
                      "headline": [
                              "Epilogue", "sans-serif"
                      ],
                      "body": [
                              "Inter", "sans-serif"
                      ],
                      "label": [
                              "Inter", "sans-serif"
                      ],
                      "display": [
                              "Pinyon Script", "cursive"
                      ]
              }
      },
          },
        }
      </script>
<style>
        body {
            background-color: #0A0A0E; /* Forcing the requested specific background per instructions */
        }
      </style>
</head>
<body class="text-on-surface font-body antialiased min-h-screen flex flex-col items-center justify-center relative overflow-x-hidden">
<!-- Ambient Glow / Negative Space Atmosphere -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<!-- Subtle Gradient Mesh / Smoke Effect -->
<div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-primary/5 via-transparent to-transparent opacity-40 mix-blend-screen"></div>
<!-- Existing Central Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px] opacity-30 mix-blend-screen translate-y-1/4"></div>
<!-- Corner Orbs -->
<div class="absolute -top-[20%] -left-[10%] w-[600px] h-[600px] bg-primary-container/10 rounded-full blur-[120px] opacity-40 mix-blend-screen"></div>
<div class="absolute -bottom-[20%] -right-[10%] w-[700px] h-[700px] bg-secondary/10 rounded-full blur-[140px] opacity-30 mix-blend-screen"></div>
<!-- Animated Star Particles / Dust Motes -->
<div class="absolute top-[15%] left-[25%] w-1 h-1 bg-white/30 rounded-full blur-[1px] animate-[float_7s_ease-in-out_infinite]"></div>
<div class="absolute top-[65%] left-[15%] w-1.5 h-1.5 bg-primary/30 rounded-full blur-[1px] animate-[float_11s_ease-in-out_infinite_1s]"></div>
<div class="absolute top-[25%] left-[75%] w-0.5 h-0.5 bg-white/40 rounded-full blur-[0.5px] animate-[float_9s_ease-in-out_infinite_2s]"></div>
<div class="absolute top-[80%] left-[80%] w-2 h-2 bg-secondary/20 rounded-full blur-[2px] animate-[float_13s_ease-in-out_infinite_0.5s]"></div>
<div class="absolute top-[45%] left-[85%] w-1 h-1 bg-white/20 rounded-full blur-[1px] animate-[float_8s_ease-in-out_infinite_3s]"></div>
<div class="absolute top-[75%] left-[45%] w-1.5 h-1.5 bg-primary-container/30 rounded-full blur-[1px] animate-[float_10s_ease-in-out_infinite_1.5s]"></div>
<div class="absolute top-[35%] left-[10%] w-1 h-1 bg-white/25 rounded-full blur-[1px] animate-[float_12s_ease-in-out_infinite_2.5s]"></div>
</div>
<!-- Main Content Container: Absolute Minimalism -->
<main class="w-full max-w-2xl px-8 py-16 z-10 flex flex-col items-center text-center space-y-16">
<!-- Header -->
<div class="space-y-6">
<h1 class="font-display text-5xl md:text-6xl text-primary-container [text-shadow:0_0_8px_#A78BFA,0_0_20px_#A78BFA] leading-tight tracking-wider">
                To Tia...
            </h1>
</div>
<!-- The Message / Confession Canvas -->
<div class="relative w-full p-8 md:p-12 rounded-3xl bg-surface-container-low/40 backdrop-blur-[12px] border border-white/5 shadow-[0_10px_40px_rgba(167,139,250,0.03)]">
<p class="font-body text-lg md:text-xl text-on-surface-variant leading-relaxed font-light tracking-wide">
                "[I've tried not to overthink it, but I like you. I have for a while. Cuma mau jujur aja.]"
            </p>
</div>
<!-- Input Area -->
<div class="w-full max-w-md space-y-4 flex flex-col items-center mt-8">
<label class="font-label text-sm text-outline-variant uppercase tracking-widest" for="confession-reply">
                Your turn to write something back:
            </label>
<div class="w-full relative group">
<textarea class="w-full bg-transparent border-0 border-b border-outline-variant/30 focus:border-primary-container focus:ring-0 text-[#E0E0E6] placeholder-on-surface-variant/30 resize-none font-body text-center text-base py-3 transition-colors duration-300" id="confession-reply" placeholder="Whisper back..." rows="3"></textarea>
<!-- Focus Glow Underline -->
<div class="absolute bottom-0 left-0 h-[1px] w-full bg-gradient-to-r from-transparent via-primary-container to-transparent scale-x-0 group-focus-within:scale-x-100 transition-transform duration-500 origin-center opacity-70"></div>
</div>
</div>
<!-- Action / The Beacon -->
<div class="pt-8 w-full flex justify-center">
<button class="relative group overflow-hidden rounded-full px-8 py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-label font-medium tracking-wide shadow-[0_0_20px_rgba(167,139,250,0.15)] transition-all duration-300 hover:shadow-[0_0_30px_rgba(167,139,250,0.3)] hover:-translate-y-0.5">
<span class="relative z-10 flex items-center gap-2 [text-shadow:0_0_4px_rgba(255,255,255,0.4)]">
                    Send it to me
                    <span class="material-symbols-outlined text-sm font-light">send</span>
</span>
<!-- Inner hover shimmer -->
<div class="absolute inset-0 -translate-x-full group-hover:animate-[shimmer_1.5s_infinite] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
</button>
</div>
<!-- subtle back action if needed, adhering to pure minimalist internal navigation -->
<div class="pt-12">
<a class="text-sm font-label text-outline-variant hover:text-primary transition-colors flex items-center gap-2 group" href="#">
<span class="material-symbols-outlined text-xs group-hover:-translate-x-1 transition-transform">arrow_back</span>
                Return to the void
            </a>
</div>
</main>
<style>
        @keyframes shimmer {
            100% {
                transform: translateX(100%);
            }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
            50% { transform: translateY(-15px) scale(1.5); opacity: 0.8; }
        }
    </style>
</body></html>
