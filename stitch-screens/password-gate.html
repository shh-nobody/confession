<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Password Gate</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700&amp;family=Inter:wght@400;500;700&amp;family=Pinyon+Script&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#cac4d4",
                        "secondary": "#cdbff0",
                        "on-error": "#690005",
                        "on-error-container": "#ffdad6",
                        "surface-dim": "#131317",
                        "secondary-fixed-dim": "#cdbff0",
                        "surface-variant": "#353439",
                        "surface-container-low": "#1b1b1f",
                        "error-container": "#93000a",
                        "surface-bright": "#39393d",
                        "on-surface": "#e4e1e7",
                        "inverse-surface": "#e4e1e7",
                        "on-background": "#e4e1e7",
                        "secondary-fixed": "#e8ddff",
                        "on-secondary-container": "#bbaede",
                        "surface-container-highest": "#353439",
                        "primary-container": "#a78bfa",
                        "tertiary-fixed": "#f8e454",
                        "background": "#131317",
                        "inverse-primary": "#674bb5",
                        "surface-container": "#1f1f24",
                        "surface-container-high": "#2a292e",
                        "on-secondary-fixed": "#1f153b",
                        "primary-fixed-dim": "#cebdff",
                        "primary-fixed": "#e8ddff",
                        "on-tertiary-fixed": "#201c00",
                        "surface": "#131317",
                        "tertiary-fixed-dim": "#dbc839",
                        "on-secondary": "#342a51",
                        "surface-container-lowest": "#0e0e12",
                        "on-primary-container": "#3c1989",
                        "on-tertiary-container": "#3b3500",
                        "on-secondary-fixed-variant": "#4b4069",
                        "tertiary": "#dbc839",
                        "outline-variant": "#494552",
                        "tertiary-container": "#af9e00",
                        "inverse-on-surface": "#303034",
                        "on-primary-fixed": "#21005e",
                        "on-primary-fixed-variant": "#4f319c",
                        "primary": "#cebdff",
                        "outline": "#948e9d",
                        "secondary-container": "#4b4069",
                        "error": "#ffb4ab",
                        "on-primary": "#381385",
                        "surface-tint": "#cebdff",
                        "on-tertiary": "#373100",
                        "on-tertiary-fixed-variant": "#504700"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Epilogue"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        /* Ambient Background Glow */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.05) 0%, rgba(19, 19, 23, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Decorative Elements */
        .mesh-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(at 80% 0%, rgba(103, 75, 181, 0.05) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(103, 75, 181, 0.05) 0px, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: 
                radial-gradient(1px 1px at 10% 20%, rgba(255, 255, 255, 0.2) 100%, transparent),
                radial-gradient(1px 1px at 30% 80%, rgba(255, 255, 255, 0.1) 100%, transparent),
                radial-gradient(2px 2px at 80% 50%, rgba(167, 139, 250, 0.15) 100%, transparent),
                radial-gradient(1px 1px at 60% 10%, rgba(255, 255, 255, 0.15) 100%, transparent),
                radial-gradient(1.5px 1.5px at 90% 90%, rgba(167, 139, 250, 0.1) 100%, transparent);
            background-size: 200px 200px;
            animation: drift 40s linear infinite;
        }

        .corner-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.1;
        }
        .glow-tl { top: -150px; left: -150px; background: #cebdff; }
        .glow-br { bottom: -150px; right: -150px; background: #674bb5; }

        @keyframes drift {
            from { background-position: 0 0; }
            to { background-position: 0 -400px; }
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- Decorative Background Elements -->
<div class="mesh-bg"></div>
<div class="particles"></div>
<div class="corner-glow glow-tl"></div>
<div class="corner-glow glow-br"></div>
<!-- Ambient Lighting Element -->
<div class="ambient-glow"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-lg px-6 flex flex-col items-center">
<!-- Header -->
<h1 class="font-['Pinyon_Script'] text-6xl md:text-7xl text-primary-container [text-shadow:0_0_8px_#A78BFA,0_0_20px_#A78BFA] leading-relaxed mb-4 text-center select-none">
            Only for...
        </h1>
<!-- Hint Text -->
<p class="font-body text-on-surface-variant text-sm tracking-wide text-center mb-16 opacity-80">
            [Clue: Nama panggilan kocak lu pas kelas 10]
        </p>
<!-- Input Form Area -->
<form class="w-full flex flex-col items-center group">
<div class="relative w-full max-w-sm">
<input autocomplete="off" class="w-full bg-transparent border-0 border-b-2 border-primary-container/50 text-center text-2xl text-on-surface py-4 px-2 focus:ring-0 focus:border-primary-container focus:outline-none transition-colors duration-300 placeholder:text-surface-variant font-body placeholder:font-light" placeholder="Enter the code..." type="password"/>
<!-- Subtle glow line that appears on focus (simulated via group focus within form) -->
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-primary-container shadow-[0_0_10px_#A78BFA] transition-all duration-500 ease-out group-focus-within:w-full"></div>
</div>
<!-- Glowing Action Button -->
<button class="mt-16 px-12 py-4 rounded-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-label font-bold tracking-widest uppercase shadow-[0_4px_20px_rgba(167,139,250,0.15)] hover:shadow-[0_10px_40px_rgba(167,139,250,0.4)] transition-all duration-500 transform hover:-translate-y-1 focus:outline-none focus:ring-2 focus:ring-primary-container focus:ring-offset-2 focus:ring-offset-background backdrop-blur-xl" type="button">
                Unlock
            </button>
</form>
</main>
</body></html>
