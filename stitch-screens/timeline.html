<!DOCTYPE html>

<html class="dark" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Timeline - The Veiled Sanctuary</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700&amp;family=Inter:wght@400;500;600&amp;family=Pinyon+Script&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#cac4d4",
                        "secondary": "#cdbff0",
                        "on-error": "#690005",
                        "on-error-container": "#ffdad6",
                        "surface-dim": "#131317",
                        "secondary-fixed-dim": "#cdbff0",
                        "surface-variant": "#353439",
                        "surface-container-low": "#1b1b1f",
                        "error-container": "#93000a",
                        "surface-bright": "#39393d",
                        "on-surface": "#e4e1e7",
                        "inverse-surface": "#e4e1e7",
                        "on-background": "#e4e1e7",
                        "secondary-fixed": "#e8ddff",
                        "on-secondary-container": "#bbaede",
                        "surface-container-highest": "#353439",
                        "primary-container": "#a78bfa",
                        "tertiary-fixed": "#f8e454",
                        "background": "#131317",
                        "inverse-primary": "#674bb5",
                        "surface-container": "#1f1f24",
                        "surface-container-high": "#2a292e",
                        "on-secondary-fixed": "#1f153b",
                        "primary-fixed-dim": "#cebdff",
                        "primary-fixed": "#e8ddff",
                        "on-tertiary-fixed": "#201c00",
                        "surface": "#131317",
                        "tertiary-fixed-dim": "#dbc839",
                        "on-secondary": "#342a51",
                        "surface-container-lowest": "#0e0e12",
                        "on-primary-container": "#3c1989",
                        "on-tertiary-container": "#3b3500",
                        "on-secondary-fixed-variant": "#4b4069",
                        "tertiary": "#dbc839",
                        "outline-variant": "#494552",
                        "tertiary-container": "#af9e00",
                        "inverse-on-surface": "#303034",
                        "on-primary-fixed": "#21005e",
                        "on-primary-fixed-variant": "#4f319c",
                        "primary": "#cebdff",
                        "outline": "#948e9d",
                        "secondary-container": "#4b4069",
                        "error": "#ffb4ab",
                        "on-primary": "#381385",
                        "surface-tint": "#cebdff",
                        "on-tertiary": "#373100",
                        "on-tertiary-fixed-variant": "#504700"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Epilogue"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .font-pinyon { font-family: 'Pinyon Script', cursive; }
        .glow-text { text-shadow: 0 0 8px #A78BFA, 0 0 20px #A78BFA; }
        .glass-card {
            background-color: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-30px) translateX(15px); }
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.05); }
        }
        .particle { animation: float 12s infinite ease-in-out; }
        .orb { animation: pulse-slow 10s infinite ease-in-out; }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col justify-center items-center py-12 px-6 relative overflow-x-hidden">
<!-- Background Decorations -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<!-- Gradient Mesh -->
<div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-surface-variant/20 via-background to-background opacity-60"></div>
<!-- Glow Orbs -->
<div class="orb absolute top-[-15%] left-[-10%] w-[50vw] h-[50vw] bg-primary-container/20 rounded-full blur-[100px]"></div>
<div class="orb absolute bottom-[-20%] right-[-15%] w-[60vw] h-[60vw] bg-inverse-primary/20 rounded-full blur-[120px]" style="animation-delay: -4s;"></div>
<div class="orb absolute top-[40%] left-[80%] w-[30vw] h-[30vw] bg-primary/10 rounded-full blur-[80px]" style="animation-delay: -7s;"></div>
<!-- Dust/Star Particles -->
<div class="particle absolute top-[20%] left-[15%] w-1.5 h-1.5 bg-primary/40 rounded-full blur-[1px]"></div>
<div class="particle absolute top-[60%] left-[80%] w-2 h-2 bg-primary-container/30 rounded-full blur-[1px]" style="animation-delay: -2s; animation-duration: 14s;"></div>
<div class="particle absolute top-[80%] left-[20%] w-1 h-1 bg-white/30 rounded-full blur-[0.5px]" style="animation-delay: -5s; animation-duration: 9s;"></div>
<div class="particle absolute top-[30%] right-[25%] w-2.5 h-2.5 bg-primary/20 rounded-full blur-[2px]" style="animation-delay: -8s; animation-duration: 16s;"></div>
<div class="particle absolute top-[10%] right-[45%] w-1 h-1 bg-white/20 rounded-full blur-[0.5px]" style="animation-delay: -3s; animation-duration: 11s;"></div>
<div class="particle absolute bottom-[15%] right-[60%] w-1.5 h-1.5 bg-primary-container/40 rounded-full blur-[1px]" style="animation-delay: -6s; animation-duration: 13s;"></div>
</div>
<div class="max-w-2xl w-full relative z-10">
<!-- Header -->
<header class="text-center mb-16">
<h1 class="font-pinyon text-5xl md:text-6xl text-primary glow-text tracking-wide mb-4">
                Flashback Bentar Yuk
            </h1>
<p class="text-on-surface-variant text-lg font-light max-w-md mx-auto">
                A quiet reflection on the moments that brought us here, emerging from the shadows.
            </p>
</header>
<!-- Timeline -->
<div class="relative pl-8 md:pl-0">
<!-- Central Line for Desktop, Left Line for Mobile -->
<div class="absolute left-8 md:left-1/2 top-0 bottom-0 w-[1px] bg-gradient-to-b from-transparent via-primary-container to-transparent opacity-30 -translate-x-1/2"></div>
<div class="space-y-16">
<!-- Item 1 -->
<div class="relative flex flex-col md:flex-row md:justify-between items-start md:items-center w-full group">
<!-- Timeline Node -->
<div class="absolute left-0 md:left-1/2 w-4 h-4 rounded-full bg-primary-container -translate-x-1/2 shadow-[0_0_10px_#A78BFA] z-10"></div>
<!-- Content -->
<div class="ml-8 md:ml-0 md:w-[45%] md:text-right md:pr-12">
<div class="glass-card rounded-2xl p-6 transition-all duration-500 hover:shadow-[0_10px_40px_rgba(167,139,250,0.08)]">
<h2 class="font-headline text-xl text-primary mb-2">Awal Kelas 10</h2>
<p class="text-on-surface-variant font-light leading-relaxed">
                                Kenal di parkiran, pake jaket kegedean.
                            </p>
</div>
</div>
<div class="hidden md:block md:w-[45%]"></div>
</div>
<!-- Item 2 -->
<div class="relative flex flex-col md:flex-row md:justify-between items-start md:items-center w-full group">
<div class="absolute left-0 md:left-1/2 w-4 h-4 rounded-full bg-primary-container -translate-x-1/2 shadow-[0_0_10px_#A78BFA] z-10"></div>
<div class="hidden md:block md:w-[45%]"></div>
<div class="ml-8 md:ml-0 md:w-[45%] md:pl-12">
<div class="glass-card rounded-2xl p-6 transition-all duration-500 hover:shadow-[0_10px_40px_rgba(167,139,250,0.08)]">
<h2 class="font-headline text-xl text-primary mb-2">Kantin Moment</h2>
<p class="text-on-surface-variant font-light leading-relaxed">
                                Ketawa bareng gara-gara hal random.
                            </p>
</div>
</div>
</div>
<!-- Item 3 -->
<div class="relative flex flex-col md:flex-row md:justify-between items-start md:items-center w-full group">
<div class="absolute left-0 md:left-1/2 w-4 h-4 rounded-full bg-primary-container -translate-x-1/2 shadow-[0_0_10px_#A78BFA] z-10"></div>
<div class="ml-8 md:ml-0 md:w-[45%] md:text-right md:pr-12">
<div class="glass-card rounded-2xl p-6 transition-all duration-500 hover:shadow-[0_10px_40px_rgba(167,139,250,0.08)]">
<h2 class="font-headline text-xl text-primary mb-2">Sekarang</h2>
<p class="text-on-surface-variant font-light leading-relaxed">
                                Sering jalan dan cerita bareng.
                            </p>
</div>
</div>
<div class="hidden md:block md:w-[45%]"></div>
</div>
</div>
</div>
<!-- Action Area -->
<div class="mt-24 text-center">
<a class="inline-flex items-center justify-center px-8 py-4 rounded-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-medium tracking-wide transition-all duration-300 hover:shadow-[0_0_25px_rgba(167,139,250,0.5)] group relative overflow-hidden" href="#">
<span class="relative z-10 group-hover:glow-text transition-all duration-300">Next: Liat Data Valid</span>
<span class="material-symbols-outlined relative z-10 ml-2 group-hover:translate-x-1 transition-transform">arrow_forward</span>
<div class="absolute inset-0 bg-white/20 blur-md opacity-0 group-hover:opacity-100 transition-opacity"></div>
</a>
</div>
</div>
</body></html>
