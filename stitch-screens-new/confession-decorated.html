<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Confession</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;family=Pinyon+Script&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#0e0e12",
                        "on-tertiary-fixed-variant": "#504700",
                        "tertiary-fixed-dim": "#dbc839",
                        "secondary-fixed-dim": "#cdbff0",
                        "on-tertiary-container": "#3b3500",
                        "surface-variant": "#353439",
                        "on-secondary": "#342a51",
                        "error": "#ffb4ab",
                        "on-primary-fixed-variant": "#4f319c",
                        "on-secondary-fixed": "#1f153b",
                        "on-primary": "#381385",
                        "on-background": "#e4e1e7",
                        "on-surface": "#e4e1e7",
                        "surface-container-highest": "#353439",
                        "background": "#131317",
                        "tertiary-fixed": "#f8e454",
                        "inverse-on-surface": "#303034",
                        "surface-bright": "#39393d",
                        "on-tertiary-fixed": "#201c00",
                        "on-error": "#690005",
                        "on-error-container": "#ffdad6",
                        "surface-container-high": "#2a292e",
                        "primary-fixed-dim": "#cebdff",
                        "surface-container-low": "#1b1b1f",
                        "inverse-primary": "#674bb5",
                        "tertiary-container": "#af9e00",
                        "secondary-fixed": "#e8ddff",
                        "secondary-container": "#4b4069",
                        "surface-tint": "#cebdff",
                        "on-tertiary": "#373100",
                        "primary-fixed": "#e8ddff",
                        "tertiary": "#dbc839",
                        "surface-dim": "#131317",
                        "surface": "#131317",
                        "error-container": "#93000a",
                        "outline-variant": "#494552",
                        "outline": "#948e9d",
                        "inverse-surface": "#e4e1e7",
                        "on-secondary-fixed-variant": "#4b4069",
                        "on-primary-container": "#3c1989",
                        "secondary": "#cdbff0",
                        "on-surface-variant": "#cac4d4",
                        "on-secondary-container": "#bbaede",
                        "on-primary-fixed": "#21005e",
                        "surface-container": "#1f1f24",
                        "primary-container": "#a78bfa",
                        "primary": "#cebdff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Epilogue"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "pinyon": ["'Pinyon Script'"]
                    }
                },
            },
        }
    </script>
<style>
        .glow-text {
            text-shadow: 0 0 8px #A78BFA, 0 0 20px #A78BFA, 0 0 30px #A78BFA;
        }
        .glow-shadow {
            box-shadow: 0 4px 15px rgba(167, 139, 250, 0.2);
        }
        .bg-glass {
            background-color: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #cebdff, #a78bfa);
        }
        
        textarea:focus {
            outline: none;
            border-bottom-color: #a78bfa;
            box-shadow: 0 1px 0 0 #a78bfa;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .animate-float {
            animation: float 15s ease-in-out infinite;
        }
        
        .animate-float-delayed {
            animation: float 20s ease-in-out infinite;
            animation-delay: -7s;
        }

        .animate-twinkle {
            animation: twinkle 4s ease-in-out infinite;
        }
        
        .animate-twinkle-delayed-1 {
            animation: twinkle 5s ease-in-out infinite;
            animation-delay: -2s;
        }
        
        .animate-twinkle-delayed-2 {
            animation: twinkle 6s ease-in-out infinite;
            animation-delay: -4s;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Ambient Glow Background -->
<div class="absolute inset-0 pointer-events-none opacity-20" style="background: radial-gradient(circle at 50% 30%, #a78bfa 0%, transparent 60%); z-index: -1;">
</div>
<!-- Ethereal Decorations (Orbs & Stardust) -->
<div class="absolute inset-0 pointer-events-none z-[-2] overflow-hidden">
<!-- Glowing Orbs -->
<div class="absolute w-[600px] h-[600px] rounded-full bg-[#a78bfa] opacity-10 blur-[120px] top-[-20%] left-[-10%] animate-float"></div>
<div class="absolute w-[500px] h-[500px] rounded-full bg-[#a78bfa] opacity-[0.08] blur-[100px] bottom-[-10%] right-[-10%] animate-float-delayed"></div>
<div class="absolute w-[300px] h-[300px] rounded-full bg-[#a78bfa] opacity-10 blur-[80px] top-[40%] right-[10%] animate-float"></div>
<!-- Stardust Particles -->
<div class="absolute w-1 h-1 bg-white rounded-full top-[15%] left-[20%] shadow-[0_0_8px_#a78bfa] animate-twinkle"></div>
<div class="absolute w-1.5 h-1.5 bg-[#a78bfa] rounded-full top-[25%] right-[25%] shadow-[0_0_10px_#a78bfa] animate-twinkle-delayed-1"></div>
<div class="absolute w-0.5 h-0.5 bg-white rounded-full top-[65%] left-[10%] shadow-[0_0_5px_#a78bfa] animate-twinkle-delayed-2"></div>
<div class="absolute w-2 h-2 bg-[#cebdff] rounded-full top-[80%] left-[30%] shadow-[0_0_12px_#cebdff] animate-twinkle blur-[1px] opacity-60"></div>
<div class="absolute w-1 h-1 bg-white rounded-full top-[55%] right-[15%] shadow-[0_0_8px_#a78bfa] animate-twinkle-delayed-1"></div>
<div class="absolute w-0.5 h-0.5 bg-white rounded-full top-[10%] right-[40%] shadow-[0_0_4px_#a78bfa] animate-twinkle"></div>
<div class="absolute w-1.5 h-1.5 bg-[#a78bfa] rounded-full top-[85%] right-[35%] shadow-[0_0_10px_#a78bfa] animate-twinkle-delayed-2 opacity-70"></div>
<div class="absolute w-1 h-1 bg-white rounded-full top-[45%] left-[5%] shadow-[0_0_8px_#a78bfa] animate-twinkle-delayed-1"></div>
<div class="absolute w-1 h-1 bg-[#cebdff] rounded-full top-[35%] left-[85%] shadow-[0_0_8px_#cebdff] animate-twinkle"></div>
<div class="absolute w-0.5 h-0.5 bg-white rounded-full top-[75%] right-[5%] shadow-[0_0_5px_#a78bfa] animate-twinkle-delayed-2"></div>
</div>
<main class="w-full max-w-2xl px-6 py-12 md:py-24 flex flex-col items-center justify-center space-y-16 z-10">
<!-- Header -->
<header class="w-full text-center">
<h1 class="font-pinyon text-5xl md:text-7xl text-primary glow-text tracking-wide">
                To Tia...
            </h1>
</header>
<!-- Message Body -->
<section class="w-full text-center max-w-xl">
<p class="text-xl md:text-2xl font-body text-on-surface-variant leading-relaxed tracking-wide">
                "I've tried not to overthink it, but I like you. I have for a while. Cuma mau jujur aja."
            </p>
</section>
<!-- Input Section -->
<section class="w-full max-w-md flex flex-col space-y-6 mt-12">
<div class="flex flex-col space-y-2 relative">
<label class="text-sm font-label text-outline uppercase tracking-[0.2em] ml-2" for="reply">
                    Your turn to write something back:
                </label>
<!-- Using ghost border fallback for input -->
<textarea class="w-full bg-surface-container-highest bg-opacity-50 border-0 border-b border-outline-variant/15 text-on-surface font-pinyon text-2xl px-4 py-3 resize-none transition-all duration-300 placeholder-outline focus:border-primary-container focus:ring-0" id="reply" name="reply" placeholder="Whisper back..." rows="3"></textarea>
</div>
<!-- Action Button -->
<div class="pt-8 flex justify-center">
<button class="btn-gradient text-on-primary font-label uppercase tracking-[0.1em] text-sm py-4 px-10 rounded-full glow-shadow hover:opacity-90 transition-opacity duration-300 w-full md:w-auto">
                    Send it to me
                </button>
</div>
</section>
</main>
</body></html>
